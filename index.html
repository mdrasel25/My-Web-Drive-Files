<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Cloud Drive v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

  <div id="loginScreen" class="flex flex-col items-center justify-center min-h-screen bg-gray-950 p-4">
    <div class="bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800 text-center max-w-sm w-full">
      <h1 class="text-3xl font-bold text-blue-500 mb-2">📁 Secure Drive</h1>
      <p class="text-gray-400 mb-6 text-sm">গুগল অ্যাকাউন্ট দিয়ে লগইন করে আপনার পার্সোনাল ড্রাইভ অ্যাক্সেস করুন।</p>
      
      <div class="flex justify-center">
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="sign_in_with" data-shape="rectangular"></div>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden max-w-6xl mx-auto p-4 sm:p-6">
    <header class="flex flex-col sm:flex-row justify-between items-center mb-8 border-b border-gray-800 pb-4 gap-4">
      <div>
        <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-2">📁 Premium Cloud Drive</h1>
        <p class="text-xs text-gray-500">Secure Backend with Google Sheets</p>
      </div>
      <div class="flex items-center gap-3 bg-gray-900 px-4 py-2 rounded-xl border border-gray-800">
        <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-blue-500 hidden">
        <div>
          <p id="userName" class="text-sm font-medium text-gray-200"></p>
          <p id="userDisplay" class="text-xs text-gray-400"></p>
        </div>
        <button onclick="logout()" class="ml-2 text-xs text-red-400 hover:text-red-300 transition">Logout</button>
      </div>
    </header>

    <div class="bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800 mb-8">
      <h2 class="text-lg font-semibold mb-3 text-gray-300">Upload File</h2>
      <div id="dropZone" class="border-2 border-dashed border-gray-700 hover:border-blue-500 rounded-xl p-8 text-center cursor-pointer transition bg-gray-950/50">
        <input type="file" id="fileInput" class="hidden" onchange="fileSelected()">
        <p id="dropZoneText" class="text-gray-400 text-sm">ফাইল এখানে ড্র্যাগ করে ছাড়ুন অথবা <span class="text-blue-400 font-semibold">Browse করুন</span></p>
        <p id="selectedFileName" class="mt-2 text-sm text-green-400 font-medium hidden"></p>
      </div>
      
      <div id="progressContainer" class="w-full bg-gray-950 border border-gray-800 rounded-full h-3 mt-4 hidden overflow-hidden">
        <div id="progressBar" class="bg-blue-600 h-full rounded-full transition-all duration-150" style="width: 0%"></div>
      </div>

      <div class="flex justify-end mt-4">
        <button onclick="startUpload()" id="uploadBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-xl transition duration-200 w-full sm:w-auto disabled:opacity-50" disabled>Upload File</button>
      </div>
      <p id="status" class="mt-3 text-sm hidden"></p>
    </div>

    <div class="flex flex-col sm:flex-row gap-4 mb-4 items-center justify-between bg-gray-900 p-4 rounded-xl border border-gray-800">
      <input type="text" id="searchInput" oninput="filterFiles()" placeholder="ফাইলের নাম দিয়ে সার্চ করুন..." class="bg-gray-950 border border-gray-700 rounded-xl px-4 py-2 w-full sm:w-72 text-white focus:outline-none focus:border-blue-500 text-sm">
      <select id="typeFilter" onchange="filterFiles()" class="bg-gray-950 border border-gray-700 rounded-xl px-4 py-2 text-white text-sm focus:outline-none w-full sm:w-44">
        <option value="all">All File Types</option>
        <option value="image">Images</option>
        <option value="pdf">PDF Documents</option>
        <option value="other">Others</option>
      </select>
    </div>

    <div class="bg-gray-900 rounded-2xl shadow-xl border border-gray-800 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-950 border-b border-gray-800 text-gray-400 text-xs tracking-wider uppercase">
              <th class="p-4">Date</th>
              <th class="p-4">Owner</th>
              <th class="p-4">File Name</th>
              <th class="p-4 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="fileTableBody" class="divide-y divide-gray-800 text-sm">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="previewModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-gray-900 rounded-2xl w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden border border-gray-800 shadow-2xl">
      <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-950">
        <h3 id="modalTitle" class="font-semibold text-gray-200 truncate pr-4">File Preview</h3>
        <button onclick="closePreview()" class="text-gray-400 hover:text-white font-bold text-xl px-2">&times;</button>
      </div>
      <div class="flex-1 bg-black">
        <iframe id="previewIframe" src="" class="w-full h-full border-0"></iframe>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ এই দুটি ভ্যারিয়েবল অবশ্যই আপনার নিজস্ব আইডি দিয়ে পরিবর্তন করবেন
    const API_URL = "YOUR_GOOGLE_WEB_APP_URL_HERE"; 
    
    let allFiles = []; 
    let currentUserEmail = "";

    // ড্র্যাগ অ্যান্ড ড্রপ ফাংশনালিটি সেটআপ
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500', 'bg-blue-950/10'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('border-blue-500', 'bg-blue-950/10'); });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-blue-500', 'bg-blue-950/10');
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileSelected();
      }
    });

    // 🛑 ফাইল সাইজ ভ্যালিডেশন (২৫ মেগাবাইট লিমিট)
    function fileSelected() {
      const file = fileInput.files[0];
      if (file) {
        const fileSizeMB = file.size / 1024 / 1024;
        
        if (fileSizeMB > 25) {
          alert("❌ দুঃখিত! সিস্টেমের নিরাপত্তার জন্য আপনি সর্বোচ্চ ২৫ মেগাবাইটের ফাইল আপロード করতে পারবেন।");
          fileInput.value = "";
          document.getElementById('selectedFileName').classList.add('hidden');
          document.getElementById('uploadBtn').disabled = true;
          return;
        }
        
        document.getElementById('selectedFileName').innerText = `Selected: ${file.name} (${fileSizeMB.toFixed(2)} MB)`;
        document.getElementById('selectedFileName').classList.remove('hidden');
        document.getElementById('uploadBtn').disabled = false;
      }
    }

    // Google Sign-In এর রেসপন্স হ্যান্ডেল
    function handleCredentialResponse(response) {
      const responsePayload = parseJwt(response.credential);
      currentUserEmail = responsePayload.email;
      
      document.getElementById("userName").innerText = responsePayload.name;
      document.getElementById("userDisplay").innerText = currentUserEmail;
      if(responsePayload.picture) {
        document.getElementById("userAvatar").src = responsePayload.picture;
        document.getElementById("userAvatar").classList.remove("hidden");
      }

      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      
      loadFiles();
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('0' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    function logout() { window.location.reload(); }

    function showStatus(text, isError = false) {
      const statusEl = document.getElementById("status");
      statusEl.innerText = text;
      statusEl.className = `mt-3 text-sm ${isError ? 'text-red-400' : 'text-blue-400 font-medium'}`;
      statusEl.classList.remove("hidden");
    }

    // 🚀 প্রোগ্রেস বার ট্র্যাকিং সহ ফাইল আপলোড ফাংশন
    function startUpload() {
      const uploadBtn = document.getElementById("uploadBtn");
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      uploadBtn.disabled = true;
      uploadBtn.innerText = "Processing...";
      
      const progressContainer = document.getElementById("progressContainer");
      const progressBar = document.getElementById("progressBar");
      progressContainer.classList.remove("hidden");
      progressBar.style.width = "0%";
      
      showStatus("ফাইল রিড করা হচ্ছে, দয়া করে অপেক্ষা করুন...");

      reader.onload = function(e) {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", API_URL, true);
        
        // রিয়েল-টাইম আপলোড প্রোগ্রেস ট্র্যাকিং লজিক
        xhr.upload.onprogress = function(event) {
          if (event.lengthComputable) {
            const percentComplete = Math.round((event.loaded / event.total) * 100);
            progressBar.style.width = percentComplete + "%";
            showStatus(`Uploading: ${percentComplete}% সম্পন্ন হয়েছে...`);
          }
        };

        xhr.onload = function() {
          uploadBtn.innerText = "Upload File";
          progressContainer.classList.add("hidden");
          
          if (xhr.status >= 200 && xhr.status < 300) {
            const res = JSON.parse(xhr.responseText);
            if(res.status === 'success') {
              showStatus("✅ ফাইল সফলভাবে আপলোড হয়েছে!", false);
              document.getElementById('selectedFileName').classList.add('hidden');
              fileInput.value = "";
              loadFiles();
            } else {
              showStatus("❌ এরর: " + res.message, true);
              uploadBtn.disabled = false;
            }
          } else {
            showStatus("❌ সার্ভার রেসপন্স ফেইলড!", true);
            uploadBtn.disabled = false;
          }
        };

        xhr.onerror = function() {
          uploadBtn.disabled = false;
          uploadBtn.innerText = "Upload File";
          progressContainer.classList.add("hidden");
          showStatus("❌ নেটওয়ার্ক কানেকশন এরর!", true);
        };

        xhr.send(JSON.stringify({
          base64Data: e.target.result,
          fileName: file.name,
          userEmail: currentUserEmail,
          fileType: file.type
        }));
      };
      reader.readAsDataURL(file);
    }

    // ফাইল লোড করা
    function loadFiles() {
      const tbody = document.getElementById("fileTableBody");
      tbody.innerHTML = `<tr><td colspan="4" class="text-center p-6 text-gray-500">Loading your secure drive space...</td></tr>`;
      
      fetch(`${API_URL}?email=${encodeURIComponent(currentUserEmail)}`)
        .then(res => res.json())
        .then(files => {
          allFiles = files;
          renderTable(allFiles);
        })
        .catch(err => {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center p-6 text-red-400">Error loading file list.</td></tr>`;
        });
    }

    // 🎨 ফাইল টাইপ আইকন নির্ধারণের ফাংশন
    function getFileIcon(type) {
      if (!type) return "📄";
      type = type.toLowerCase();
      if (type.startsWith("image/")) return "🖼️";
      if (type.includes("pdf")) return "📄";
      if (type.startsWith("video/")) return "🎬";
      if (type.startsWith("audio/")) return "🎵";
      if (type.includes("zip") || type.includes("rar")) return "📦";
      if (type.includes("sheet") || type.includes("excel") || type.includes("csv")) return "📊";
      if (type.includes("word") || type.includes("document")) return "📝";
      return "📁";
    }

    // 💾 ডিরেক্ট ডাউনলোড ইউআরএল তৈরি
    function getDownloadUrl(previewUrl) {
      try {
        const match = previewUrl.match(/[-\w]{25,}/);
        if (match) return `https://docs.google.com/uc?export=download&id=${match[0]}`;
      } catch(e) {}
      return previewUrl;
    }

    // 🗑️ ফাইল ডিলিট করার ফ্রন্টএন্ড ফাংশন
    function deleteFile(fileUrl, fileName) {
      if (!confirm(`আপনি কি নিশ্চিতভাবে "${fileName}" ফাইলটি ক্লাউড থেকে ডিলিট করতে চান?`)) return;
      
      showStatus("ফাইল ডিলিট করা হচ্ছে...");
      
      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "delete",
          fileUrl: fileUrl,
          userEmail: currentUserEmail
        })
      })
      .then(res => res.json())
      .then(res => {
        if (res.status === 'success') {
          showStatus("🗑️ ফাইলটি সফলভাবে ডিলিট করা হয়েছে!");
          loadFiles();
        } else {
          showStatus("❌ ডিলিট করা সম্ভব হয়নি: " + res.message, true);
        }
      })
      .catch(err => {
        showStatus("❌ কানেকশন এরর!", true);
      });
    }

    function renderTable(files) {
      const tbody = document.getElementById("fileTableBody");
      tbody.innerHTML = "";
      
      if(files.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center p-6 text-gray-500">No files found matching criteria.</td></tr>`;
        return;
      }

      files.forEach(file => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-gray-900/50 transition border-b border-gray-900";
        
        const icon = getFileIcon(file.type);
        const downloadUrl = getDownloadUrl(file.url);
        
        tr.innerHTML = `
          <td class="p-4 text-gray-400 text-xs sm:text-sm whitespace-nowrap">${file.date}</td>
          <td class="p-4 text-gray-300 font-medium text-xs sm:text-sm max-w-[120px] truncate">${file.user}</td>
          <td class="p-4 text-blue-400 font-medium truncate max-w-[180px] sm:max-w-xs">
            <span class="mr-2">${icon}</span>${file.name}
          </td>
          <td class="p-4 text-center flex items-center justify-center gap-2 flex-wrap sm:flex-nowrap">
            <button onclick="openPreview('${file.url}', '${file.name}')" class="bg-gray-800 hover:bg-gray-700 text-gray-200 text-xs px-2.5 py-1.5 rounded-xl border border-gray-700 transition">Preview</button>
            <a href="${downloadUrl}" target="_blank" class="bg-green-600 hover:bg-green-700 text-white text-xs px-2.5 py-1.5 rounded-xl transition">Download</a>
            <button onclick="deleteFile('${file.url}', '${file.name}')" class="bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white text-xs px-2.5 py-1.5 rounded-xl transition border border-red-500/20">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // সার্চ এবং ফিল্টারিং লজিক
    function filterFiles() {
      const searchVal = document.getElementById("searchInput").value.toLowerCase();
      const typeFilter = document.getElementById("typeFilter").value;
      
      const filtered = allFiles.filter(file => {
        const matchesSearch = file.name.toLowerCase().includes(searchVal);
        let matchesType = true;
        
        if (typeFilter === "image") matchesType = file.type.startsWith("image/");
        else if (typeFilter === "pdf") matchesType = file.type.includes("pdf");
        else if (typeFilter === "other") matchesType = !file.type.startsWith("image/") && !file.type.includes("pdf");
        
        return matchesSearch && matchesType;
      });
      
      renderTable(filtered);
    }

    function openPreview(url, name) {
      document.getElementById("modalTitle").innerText = name;
      document.getElementById("previewIframe").src = url;
      document.getElementById("previewModal").classList.remove("hidden");
    }

    function closePreview() {
      document.getElementById("previewModal").classList.add("hidden");
      document.getElementById("previewIframe").src = "";
    }
  </script>
</body>
</html>
